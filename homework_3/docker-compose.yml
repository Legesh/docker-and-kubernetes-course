version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: sdk-ops/Dockerfile-backend
    container_name: couple-games-backend
    ports:
      - "8000:8080"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: couple-games
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db

  client:
    build:
      context: ..
      dockerfile: sdk-ops/Dockerfile-client
    container_name: couple-games-client
    ports:
      - "8080:8080"
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: couple-games-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: couple-games
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
    name: couple-games_dbdata
