version: "3.8"

services:
  backend:
    image: couple-games-backend:local
    ports:
      - "8000:8080"
    volumes:
      - appdata:/appdata
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: couple-games
      DB_USERNAME: root
      DB_PASSWORD: root
    command: >
      sh -c '
      mkdir -p /appdata &&
      count=$$(cat /appdata/visits.txt 2>/dev/null || echo 0) &&
      count=$$((count + 1)) &&
      echo $$count > /appdata/visits.txt &&
      echo "App starts counter: $$count" &&
      php artisan serve --host=0.0.0.0 --port=8080
      '
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$ok = @file_get_contents(\"http://127.0.0.1:8080\"); exit($$ok === false ? 1 : 0);'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        order: start-first

  client:
    image: couple-games-client:local
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        order: start-first

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: couple-games
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        parallelism: 1
        order: stop-first

volumes:
  dbdata:
    name: couple-games_dbdata
  appdata:
    name: couple-games_appdata
